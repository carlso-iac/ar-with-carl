<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tap to Place AR</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      a-scene { width: 100vw !important; height: 100vh !important; }
      canvas { width: 100vw !important; height: 100vh !important; }
    </style>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="ui" style="position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 10; pointer-events: none; font-family: sans-serif;">
      <div id="status" style="background: rgba(0,0,0,0.65); color: white; display: inline-block; padding: 10px 24px; border-radius: 24px; font-size: 15px;">
        Tap anywhere to place model
      </div>
    </div>

    <a-scene
      id="scene"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false">

      <a-assets>
        <a-asset-item id="myModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-camera id="cam"></a-camera>

      <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
      const statusEl = document.querySelector('#status');
      let spawnCount = 0;

      function spawnModelAt(x, y, z) {
        const scene = document.querySelector('a-scene');
        const entity = document.createElement('a-entity');
        entity.setAttribute('gltf-model', '#myModel');
        entity.setAttribute('scale', '1 1 1');
        entity.setAttribute('position', `${x} ${y} ${z}`);
        scene.appendChild(entity);
        spawnCount++;
        statusEl.innerText = `${spawnCount} model${spawnCount > 1 ? 's' : ''} placed — tap to add more`;
      }

      function handleTap(clientX, clientY) {
        const cam = document.querySelector('#cam');
        const camera = cam.getObject3D('camera');
        if (!camera) return;

        // Convert screen tap to normalized device coordinates
        const ndcX = (clientX / window.innerWidth) * 2 - 1;
        const ndcY = -(clientY / window.innerHeight) * 2 + 1;

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);

        // Ground plane at y = -1.6 (assumes eye/camera height ~1.6m above ground)
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.6);
        const target = new THREE.Vector3();
        const hit = raycaster.ray.intersectPlane(groundPlane, target);

        if (hit) {
          spawnModelAt(target.x, target.y, target.z);
        }
      }

      // Mobile touch
      document.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleTap(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      // Desktop click (for testing)
      document.addEventListener('click', (e) => {
        handleTap(e.clientX, e.clientY);
      });
    </script>
  </body>
</html>
