<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-target-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); color: white; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="ui-overlay"><h1>Tap to Start Surface AR</h1></div>

    <a-scene 
      mindar-target="autoStart: false" 
      embedded 
      color-space="sRGB" 
      renderer="colorManagement: true, exposure: 1" 
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="my-model" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .ground"></a-camera>

      <a-entity id="ground" class="ground" geometry="primitive: plane; width: 100; height: 100" rotation="-90 0 0" material="transparent: true; opacity: 0"></a-entity>

      <a-entity light="type: ambient; intensity: 1"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

      <a-entity id="container"></a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#ui-overlay');
      const sceneEl = document.querySelector('a-scene');
      const container = document.querySelector('#container');

      // Start the AR engine when user taps the overlay
      overlay.addEventListener('click', () => {
        overlay.style.display = 'none';
        sceneEl.systems['mindar-target'].start(); // Explicitly start MindAR
      });

      // Spawning Logic
      sceneEl.addEventListener('click', (event) => {
        // Find the intersection point on our invisible ground
        const touchPoint = event.detail.intersection ? event.detail.intersection.point : null;
        
        if (touchPoint) {
          const newEntity = document.createElement('a-entity');
          newEntity.setAttribute('gltf-model', '#my-model');
          newEntity.setAttribute('position', touchPoint);
          newEntity.setAttribute('scale', '0.5 0.5 0.5'); // Adjust scale as needed
          
          container.appendChild(newEntity);
        }
      });
    </script>
  </body>
</html>
