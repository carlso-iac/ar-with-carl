<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); color: white; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; text-align: center;
      }
      #status-indicator {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7); color: #fff; padding: 10px 20px;
        border-radius: 20px; font-size: 13px; z-index: 9998; pointer-events: none;
        border: 1px solid #4CC3D9; text-align: center; min-width: 200px;
      }
    </style>
  </head>

  <body>
    <div id="status-indicator">Status: Waiting for AR...</div>

    <div id="ui-overlay">
      <h1>Surface AR</h1>
      <p>1. Tap to Start<br>2. Move phone to find the floor<br>3. Tap the blue ring to spawn</p>
    </div>

    <a-scene 
      webxr="optionalFeatures: hit-test, local-floor;"
      ar-mode-ui="enabled: true"
      renderer="colorManagement: true">
      
      <a-assets>
        <a-asset-item id="my-model" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <a-entity id="reticle" visible="false">
        <a-ring radius-inner="0.05" radius-outer="0.07" rotation="-90 0 0" material="color: #4CC3D9; shader: flat"></a-ring>
        <a-sphere radius="0.01" material="color: #4CC3D9; shader: flat"></a-sphere>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

      <a-entity id="container"></a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#ui-overlay');
      const sceneEl = document.querySelector('a-scene');
      const reticle = document.querySelector('#reticle');
      const container = document.querySelector('#container');
      const status = document.querySelector('#status-indicator');

      // 1. Enter AR Mode
      overlay.addEventListener('click', () => {
        overlay.style.display = 'none';
        sceneEl.enterAR();
      });

      // 2. Spawn Logic
      sceneEl.addEventListener('enter-vr', () => {
        const session = sceneEl.xrSession;
        status.innerHTML = "AR Active: Scanning for floor...";

        session.addEventListener('select', () => {
          if (reticle.getAttribute('visible')) {
            const newEntity = document.createElement('a-entity');
            newEntity.setAttribute('gltf-model', '#my-model');
            newEntity.setAttribute('position', reticle.getAttribute('position'));
            newEntity.setAttribute('scale', '0.5 0.5 0.5');
            
            // Random Y rotation so they don't all face the same way
            newEntity.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
            
            container.appendChild(newEntity);
            status.innerHTML = "✅ Object Spawned!";
            setTimeout(() => { status.innerHTML = "Status: Floor Detected"; }, 2000);
          } else {
            status.innerHTML = "❌ Tap failed: No floor detected yet";
          }
        });
      });

      // 3. Hit-Test (Floor Tracking) Setup
      let hitTestSource = null;
      let localReferenceSpace = null;

      sceneEl.addEventListener('render-target-loaded', () => {
        sceneEl.renderer.xr.addEventListener('sessionstart', async () => {
          const session = sceneEl.renderer.xr.getSession();
          const viewerSpace = await session.requestReferenceSpace('viewer');
          localReferenceSpace = await session.requestReferenceSpace('local-floor');
          hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
        });
      });

      // 4. Update Reticle every frame
      sceneEl.addEventListener('tick', () => {
        const frame = sceneEl.frame;
        if (!frame || !hitTestSource) return;

        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(localReferenceSpace);

          reticle.setAttribute('visible', true);
          reticle.setAttribute('position', pose.transform.position);
          reticle.object3D.quaternion.copy(pose.transform.orientation);
          
          if(status.innerHTML.includes("Scanning")) {
            status.innerHTML = "Status: Floor Detected (Ready!)";
            status.style.color = "#4AFF4A";
          }
        } else {
          reticle.setAttribute('visible', false);
        }
      });
    </script>
  </body>
</html>
