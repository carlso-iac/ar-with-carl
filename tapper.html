<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* Initial Start Overlay */
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); color: white; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; text-align: center;
      }

      /* Model Loading Status - Bottom Middle */
      #status-indicator {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        z-index: 9998;
        pointer-events: none; /* Don't block clicks */
        border: 1px solid rgba(255,255,255,0.3);
      }
    </style>
  </head>

  <body>
    <div id="status-indicator">Status: Checking model...</div>

    <div id="ui-overlay">
      <h1>Surface AR</h1>
      <p>Tap to start. Look for a flat surface.</p>
    </div>

    <a-scene 
      webxr="optionalFeatures: hit-test;"
      ar-mode-ui="enabled: true"
      renderer="colorManagement: true">
      
      <a-assets>
        <a-asset-item id="my-model" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <a-entity id="reticle" geometry="primitive: ring; radiusInner: 0.04; radiusOuter: 0.06" 
                rotation="-90 0 0" material="color: #4CC3D9; shader: flat" visible="false"></a-entity>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

      <a-entity id="container"></a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#ui-overlay');
      const sceneEl = document.querySelector('a-scene');
      const reticle = document.querySelector('#reticle');
      const container = document.querySelector('#container');
      const status = document.querySelector('#status-indicator');
      const modelAsset = document.querySelector('#my-model');

      // --- 1. Model Loading Checker ---
      // Check if already loaded (browser cache)
      if (modelAsset.complete) {
        status.innerHTML = "Status: Model Loaded ✅";
        status.style.color = "#4AFF4A";
      }

      modelAsset.addEventListener('loaded', () => {
        status.innerHTML = "Status: Model Loaded ✅";
        status.style.color = "#4AFF4A";
      });

      modelAsset.addEventListener('error', () => {
        status.innerHTML = "Status: Model Load Error ❌";
        status.style.color = "#FF4A4A";
      });

      // --- 2. Enter AR Logic ---
      overlay.addEventListener('click', () => {
        overlay.style.display = 'none';
        sceneEl.enterAR();
      });

      // --- 3. Spawning Logic ---
      sceneEl.addEventListener('enter-vr', () => {
        const session = sceneEl.xrSession;
        if (!session) return;

        session.addEventListener('select', () => {
          if (reticle.getAttribute('visible')) {
            const newEntity = document.createElement('a-entity');
            newEntity.setAttribute('gltf-model', '#my-model');
            newEntity.setAttribute('position', reticle.getAttribute('position'));
            
            // Scaled down to 0.5 as requested
            newEntity.setAttribute('scale', '0.5 0.5 0.5'); 
            
            container.appendChild(newEntity);
            status.innerHTML = "Status: Object Placed";
            
            // Reset status text after a moment
            setTimeout(() => { 
                status.innerHTML = "Status: Model Loaded ✅"; 
            }, 2000);
          }
        });
      });

      // --- 4. Floor Detection (Hit-Test) ---
      sceneEl.addEventListener('render-target-loaded', () => {
        const renderer = sceneEl.renderer;
        renderer.xr.addEventListener('sessionstart', () => {
          const session = renderer.xr.getSession();
          session.requestReferenceSpace('viewer').then((space) => {
            session.requestHitTestSource({ space: space }).then((source) => {
              sceneEl.hitTestSource = source;
            });
          });
        });
      });

      sceneEl.addEventListener('tick', () => {
        const frame = sceneEl.frame;
        if (!frame || !sceneEl.hitTestSource) return;

        const hitTestResults = frame.getHitTestResults(sceneEl.hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const referenceSpace = sceneEl.renderer.xr.getReferenceSpace();
          const pose = hit.getPose(referenceSpace);

          reticle.setAttribute('visible', true);
          reticle.setAttribute('position', pose.transform.position);
          reticle.object3D.quaternion.copy(pose.transform.orientation);
        } else {
          reticle.setAttribute('visible', false);
        }
      });
    </script>
  </body>
</html>
