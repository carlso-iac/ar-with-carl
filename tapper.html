<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      webxr="optionalFeatures: hit-test;" 
      ar-hit-test="target: #model-container;"
      renderer="physicallyCorrectLights: true; alpha: true; colorManagement: true;"
      background="color: #000; transparent: true">

      <a-assets>
        <a-asset-item id="myModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

      <a-entity id="model-container" position="0 0 0">
        <a-ring color="cyan" rotation="-90 0 0" radius-inner="0.05" radius-outer="0.1"></a-ring>
        
        <a-entity 
          id="placed-model"
          gltf-model="#myModel" 
          scale="0.5 0.5 0.5" 
          visible="false">
        </a-entity>
      </a-entity>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const model = document.querySelector('#placed-model');
      
      sceneEl.addEventListener('enter-vr', () => {
        if (sceneEl.is('ar-mode')) {
          // Hide the default black background when entering AR
          sceneEl.setAttribute('background', 'transparent: true');
          
          sceneEl.xrSession.addEventListener('select', () => {
            // Get position of the reticle container
            const container = document.querySelector('#model-container');
            const newPos = container.getAttribute('position');
            
            // Move and show the model
            model.setAttribute('position', newPos);
            model.setAttribute('visible', 'true');
          });
        }
      });
    </script>
  </body>
</html>
