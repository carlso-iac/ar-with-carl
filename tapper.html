<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-ar-components@0.5.1/dist/aframe-ar-components.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      webxr="optionalFeatures: hit-test;" 
      ar-hit-test="target: #model-container; type: footprint;"
      renderer="physicallyCorrectLights: true; exposure: 1; colorManagement: true;">

    <a-entity light="type: ambient; intensity: 2.0;"></a-entity>
    <a-entity light="type: directional; intensity: 1.5;" position="1 1 1"></a-entity>
      
      <a-assets>
        <a-asset-item id="myModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-entity id="model-container" position="0 0 0">
        <a-entity 
          id="placed-model"
          gltf-model="#myModel" 
          scale="0.5 0.5 0.5" 
          visible="false">
        </a-entity>
      </a-entity>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const model = document.querySelector('#placed-model');
      
      // Listen for the 'select' event (screen tap in AR)
      sceneEl.addEventListener('enter-vr', () => {
        if (sceneEl.is('ar-mode')) {
          sceneEl.xrSession.addEventListener('select', () => {
            if (model.getAttribute('visible') === false) {
              // Get the current position of the hit-test indicator
              const hitTestPos = document.querySelector('#model-container').getAttribute('position');
              model.setAttribute('position', hitTestPos);
              model.setAttribute('visible', 'true');
            }
          });
        }
      });
    </script>
  </body>
</html>
